<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jemm Arc — Command Interface</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #0a0f1a;
    color: #e8eaf0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState, useRef, useEffect } = React;

const API_URL = "http://localhost:5000";

const ACTION_ICONS = {
  lights_off: "💡",
  lights_on: "💡",
  increase_temp: "🌡️",
  decrease_temp: "❄️",
  lock_door: "🔒",
  unlock_door: "🔓",
  dim_lights: "🌙",
  brighten_lights: "☀️",
  close_blinds: "🪟",
  open_blinds: "🪟",
};

function getIcon(action) {
  const parts = action.split(",").map(a => a.trim());
  return parts.map(p => ACTION_ICONS[p] || "⚡").join(" ");
}

function StatusBadge({ status }) {
  return (
    <div style={{
      display: "inline-flex",
      alignItems: "center",
      gap: "6px",
      padding: "4px 12px",
      borderRadius: "100px",
      fontSize: "12px",
      fontWeight: 500,
      background: status === "online" ? "rgba(34,197,94,0.15)" : "rgba(239,68,68,0.15)",
      color: status === "online" ? "#4ade80" : "#f87171",
      border: `1px solid ${status === "online" ? "rgba(34,197,94,0.3)" : "rgba(239,68,68,0.3)"}`,
    }}>
      <div style={{
        width: 6, height: 6, borderRadius: "50%",
        background: status === "online" ? "#4ade80" : "#f87171",
        animation: status === "online" ? "pulse 2s infinite" : "none"
      }} />
      {status === "online" ? "Gateway Online" : "Gateway Offline"}
    </div>
  );
}

function CommandLog({ entries }) {
  const bottomRef = useRef(null);
  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [entries]);

  if (entries.length === 0) {
    return (
      <div style={{
        flex: 1,
        display: "flex",
        flexDirection: "column",
        alignItems: "center",
        justifyContent: "center",
        gap: "12px",
        color: "rgba(255,255,255,0.2)",
        padding: "3rem",
      }}>
        <div style={{ fontSize: "2.5rem" }}>🏠</div>
        <div style={{ fontSize: "14px", textAlign: "center", lineHeight: 1.6 }}>
          No commands yet.<br/>Try typing or speaking to your home.
        </div>
      </div>
    );
  }

  return (
    <div style={{
      flex: 1,
      overflowY: "auto",
      padding: "1rem",
      display: "flex",
      flexDirection: "column",
      gap: "10px",
    }}>
      {entries.map((entry, i) => (
        <div key={i} style={{
          background: "rgba(255,255,255,0.04)",
          border: "1px solid rgba(255,255,255,0.08)",
          borderRadius: "12px",
          padding: "14px 16px",
          animation: "fadeIn 0.3s ease",
        }}>
          <div style={{
            fontSize: "13px",
            color: "rgba(255,255,255,0.5)",
            marginBottom: "6px",
            display: "flex",
            justifyContent: "space-between",
            alignItems: "center",
          }}>
            <span style={{ display: "flex", alignItems: "center", gap: "6px" }}>
              {entry.source === "voice" ? "🎙️ Voice" : "⌨️ Text"}
            </span>
            <span style={{
              fontSize: "11px",
              color: entry.latency < 150 ? "#4ade80" : entry.latency < 250 ? "#fbbf24" : "#f87171",
              background: "rgba(255,255,255,0.06)",
              padding: "2px 8px",
              borderRadius: "100px",
            }}>{entry.latency}ms</span>
          </div>
          <div style={{
            fontSize: "15px",
            fontWeight: 400,
            color: "#e8eaf0",
            marginBottom: "10px",
          }}>"{entry.command}"</div>
          <div style={{
            display: "flex",
            alignItems: "center",
            gap: "8px",
          }}>
            <span style={{ fontSize: "18px" }}>{getIcon(entry.action)}</span>
            <span style={{
              fontSize: "13px",
              fontWeight: 500,
              color: "#60a5fa",
              fontFamily: "monospace",
              background: "rgba(96,165,250,0.1)",
              padding: "3px 10px",
              borderRadius: "6px",
            }}>{entry.action}</span>
          </div>
        </div>
      ))}
      <div ref={bottomRef} />
    </div>
  );
}

function App() {
  const [command, setCommand] = useState("");
  const [log, setLog] = useState([]);
  const [loading, setLoading] = useState(false);
  const [gatewayStatus, setGatewayStatus] = useState("checking");
  const [listening, setListening] = useState(false);
  const inputRef = useRef(null);
  const recognitionRef = useRef(null);

  useEffect(() => {
    fetch(`${API_URL}/health`)
      .then(r => r.json())
      .then(d => setGatewayStatus(d.status))
      .catch(() => setGatewayStatus("offline"));
  }, []);

  async function sendCommand(cmd, source = "text") {
    if (!cmd.trim() || loading) return;
    setLoading(true);
    setCommand("");

    try {
      const res = await fetch(`${API_URL}/command`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ command: cmd.trim() }),
      });
      const data = await res.json();
      setLog(prev => [...prev, {
        command: cmd.trim(),
        action: data.action,
        latency: data.latency_ms,
        source,
      }]);
    } catch (err) {
      setLog(prev => [...prev, {
        command: cmd.trim(),
        action: "error — gateway unreachable",
        latency: 0,
        source,
      }]);
    }
    setLoading(false);
    inputRef.current?.focus();
  }

  function handleKey(e) {
    if (e.key === "Enter") sendCommand(command, "text");
  }

  function startListening() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      alert("Voice recognition not supported in this browser. Use Chrome.");
      return;
    }

    const recognition = new SpeechRecognition();
    recognition.lang = "en-US";
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    recognition.onstart = () => setListening(true);
    recognition.onend = () => setListening(false);

    recognition.onresult = (event) => {
      const transcript = event.results[0][0].transcript;
      sendCommand(transcript, "voice");
    };

    recognition.onerror = () => setListening(false);

    recognitionRef.current = recognition;
    recognition.start();
  }

  function stopListening() {
    recognitionRef.current?.stop();
    setListening(false);
  }

  const suggestions = [
    "turn off the lights",
    "good night",
    "it's too cold",
    "movie time",
    "I'm leaving",
    "yo kill the lights",
  ];

  return (
    <div style={{
      width: "100%",
      maxWidth: "520px",
      height: "700px",
      background: "#111827",
      borderRadius: "20px",
      border: "1px solid rgba(255,255,255,0.08)",
      display: "flex",
      flexDirection: "column",
      overflow: "hidden",
      boxShadow: "0 40px 80px rgba(0,0,0,0.6)",
    }}>
      {/* Header */}
      <div style={{
        padding: "20px 20px 16px",
        borderBottom: "1px solid rgba(255,255,255,0.06)",
        display: "flex",
        justifyContent: "space-between",
        alignItems: "center",
      }}>
        <div>
          <div style={{
            fontFamily: "'DM Serif Display', serif",
            fontSize: "20px",
            fontStyle: "italic",
            color: "#e8eaf0",
            lineHeight: 1,
            marginBottom: "4px",
          }}>Jemm Arc</div>
          <div style={{ fontSize: "12px", color: "rgba(255,255,255,0.35)" }}>
            Home Command Interface
          </div>
        </div>
        <StatusBadge status={gatewayStatus} />
      </div>

      {/* Log */}
      <CommandLog entries={log} />

      {/* Suggestions */}
      {log.length === 0 && (
        <div style={{
          padding: "0 1rem 0.75rem",
          display: "flex",
          flexWrap: "wrap",
          gap: "6px",
        }}>
          {suggestions.map((s, i) => (
            <button key={i} onClick={() => sendCommand(s, "text")} style={{
              fontSize: "11px",
              padding: "4px 10px",
              borderRadius: "100px",
              border: "1px solid rgba(255,255,255,0.1)",
              background: "rgba(255,255,255,0.04)",
              color: "rgba(255,255,255,0.5)",
              cursor: "pointer",
              fontFamily: "'DM Sans', sans-serif",
            }}>{s}</button>
          ))}
        </div>
      )}

      {/* Input row */}
      <div style={{
        padding: "12px 16px 16px",
        borderTop: "1px solid rgba(255,255,255,0.06)",
        display: "flex",
        gap: "8px",
      }}>
        {/* Mic button */}
        <button
          onClick={listening ? stopListening : startListening}
          style={{
            width: "46px",
            height: "46px",
            borderRadius: "10px",
            border: "none",
            background: listening ? "rgba(239,68,68,0.2)" : "rgba(255,255,255,0.06)",
            color: listening ? "#f87171" : "rgba(255,255,255,0.4)",
            fontSize: "18px",
            cursor: "pointer",
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            flexShrink: 0,
            transition: "all 0.2s",
            animation: listening ? "micPulse 1s infinite" : "none",
          }}
          title={listening ? "Stop listening" : "Start voice command"}
        >
          🎙️
        </button>

        <input
          ref={inputRef}
          value={command}
          onChange={e => setCommand(e.target.value)}
          onKeyDown={handleKey}
          placeholder={listening ? "Listening..." : "Tell your home something..."}
          style={{
            flex: 1,
            padding: "12px 16px",
            background: listening ? "rgba(239,68,68,0.06)" : "rgba(255,255,255,0.06)",
            border: `1px solid ${listening ? "rgba(239,68,68,0.3)" : "rgba(255,255,255,0.1)"}`,
            borderRadius: "10px",
            color: "#e8eaf0",
            fontSize: "14px",
            fontFamily: "'DM Sans', sans-serif",
            outline: "none",
            transition: "all 0.2s",
          }}
        />
        <button
          onClick={() => sendCommand(command, "text")}
          disabled={loading || !command.trim()}
          style={{
            padding: "12px 20px",
            background: loading ? "rgba(96,165,250,0.3)" : "#3b82f6",
            border: "none",
            borderRadius: "10px",
            color: "white",
            fontSize: "14px",
            fontWeight: 500,
            cursor: loading ? "not-allowed" : "pointer",
            fontFamily: "'DM Sans', sans-serif",
            transition: "all 0.2s",
            minWidth: "80px",
          }}
        >
          {loading ? "..." : "Send →"}
        </button>
      </div>
    </div>
  );
}

ReactDOM.render(<React.StrictMode><App /></React.StrictMode>, document.getElementById("root"));
</script>

<style>
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes micPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
  50% { box-shadow: 0 0 0 8px rgba(239,68,68,0); }
}
</style>
</body>
</html>
